name: secure-pipeline

# Thin orchestrator over factory/pipeline/config.yaml.
#
# - The matrix is generated from `scanners[].id` so adding a scanner is a
#   one-line edit in config.yaml; no edits to this workflow.
# - Each matrix cell calls `factory/pipeline/run-scanner.sh <id>`, which
#   dispatches to the correct adapter under factory/pipeline/scanners/.
# - The gate downloads every SARIF artifact, checks coverage against
#   config.yaml (a missing SARIF fails the gate), and fails on CRITICAL/HIGH.
# - On push to main, the container image is pushed to ghcr.io, signed with
#   cosign (keyless, via OIDC), and a SLSA provenance attestation + an SBOM
#   attestation are produced via GitHub's native attest-* actions.
#
# Supply-chain hygiene (own threat model, TM-SUP-*):
# - Scanner binaries are version-pinned release-asset downloads -- never
#   `curl | sh` of an unpinned script from a moving branch.
# - GITHUB_TOKEN is least-privilege per job; the workflow default is
#   contents: read only.
# - Third-party actions should be pinned to full commit SHAs (Dependabot's
#   github-actions ecosystem keeps SHA pins fresh).

# Default branch (`main`) is the canonical signing/retention trigger. We
# also fire on `master` so the demo repository (still on the legacy default)
# can produce a real push-event run for the failing/passing walkthrough; rename
# the branch to `main` and drop the second entry below.
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Default-deny. Each job re-declares only what it actually needs.
permissions:
  contents: read

env:
  CONFIG_FILE: factory/pipeline/config.yaml
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/efex-payments
  CONFTEST_VERSION: "0.55.0"
  GITLEAKS_VERSION: "8.21.2"
  TRIVY_VERSION: "0.58.1"
  SYFT_VERSION: "1.18.1"
  YQ_VERSION: "4.44.6"

jobs:
  # =========================================================================
  # Step 0 -- self-test every custom policy BEFORE we waste matrix minutes.
  # A broken policy must fail loudly here, not silently scan nothing.
  # =========================================================================
  policy-tests:
    name: custom policy self-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install conftest (version-pinned release asset)
        run: |
          curl -sSfL -o /tmp/conftest.tgz \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          sudo tar -xzf /tmp/conftest.tgz -C /usr/local/bin conftest
      - name: OPA policy fixtures (conftest verify)
        run: |
          conftest verify \
            --policy factory/policies/opa/aws \
            --policy factory/policies/opa/lib
      - name: Custom Checkov check self-test (EFEX_DOCKER_001 must fire)
        run: |
          pipx install checkov
          checkov --directory factory/policies/checkov/tests/fixtures \
            --external-checks-dir factory/policies/checkov \
            --framework dockerfile \
            --check EFEX_DOCKER_001 \
            --output json --soft-fail > /tmp/efex_docker_001.json
          python3 - <<'PY'
          import json
          doc = json.load(open("/tmp/efex_docker_001.json"))
          docs = doc if isinstance(doc, list) else [doc]
          failed, passed = set(), set()
          for d in docs:
              r = d.get("results", {})
              failed |= {c["file_path"] for c in r.get("failed_checks", []) if c["check_id"] == "EFEX_DOCKER_001"}
              passed |= {c["file_path"] for c in r.get("passed_checks", []) if c["check_id"] == "EFEX_DOCKER_001"}
          assert any("no_user" in f for f in failed), f"no_user fixture did not FAIL: {failed or 'check never loaded'}"
          assert any("root_user" in f for f in failed), f"root_user fixture did not FAIL: {failed}"
          assert any("nonroot_user" in f for f in passed), f"nonroot_user fixture did not PASS: {passed}"
          print("EFEX_DOCKER_001 fires correctly on all three fixtures")
          PY

  # =========================================================================
  # Step 1 -- expand the scanner matrix from config.yaml.
  # =========================================================================
  matrix:
    name: build matrix from config
    runs-on: ubuntu-latest
    needs: policy-tests
    permissions:
      contents: read
    outputs:
      scanners: ${{ steps.expand.outputs.scanners }}
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        uses: mikefarah/yq@v4
      - id: expand
        run: |
          IDS=$(yq -o=json '[.scanners[].id]' "$CONFIG_FILE" | jq -c .)
          echo "scanners=$IDS" >> "$GITHUB_OUTPUT"
          echo "Discovered scanners: $IDS"

  # =========================================================================
  # Step 2 -- run every scanner in parallel, one matrix cell per id.
  # =========================================================================
  scan:
    name: scan * ${{ matrix.scanner }}
    needs: matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF to GitHub code-scanning
    strategy:
      fail-fast: false   # one scanner crashing must not hide others
      matrix:
        scanner: ${{ fromJSON(needs.matrix.outputs.scanners) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install yq + jq + envsubst (toolchain for run-scanner.sh)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gettext-base jq
          sudo wget -qO /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

      # Version-pinned release assets only. The python tools (semgrep,
      # checkov) come from pipx/PyPI; their rulesets update server-side
      # regardless of CLI version, so a hard pin buys little there.
      - name: Install scanner toolchain on demand
        run: |
          case "${{ matrix.scanner }}" in
            secrets)
              curl -sSfL -o /tmp/gitleaks.tgz \
                "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
              sudo tar -xzf /tmp/gitleaks.tgz -C /usr/local/bin gitleaks
              ;;
            sast-python) pipx install semgrep ;;
            sca-python|container-image)
              curl -sSfL -o /tmp/trivy.tgz \
                "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
              sudo tar -xzf /tmp/trivy.tgz -C /usr/local/bin trivy
              ;;
            iac-defaults-aws|dockerfile-service) pipx install checkov ;;
            iac-custom-aws|iac-platform-aws)
              curl -sSfL -o /tmp/conftest.tgz \
                "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
              sudo tar -xzf /tmp/conftest.tgz -C /usr/local/bin conftest
              ;;
            sbom)
              curl -sSfL -o /tmp/syft.tgz \
                "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz"
              sudo tar -xzf /tmp/syft.tgz -C /usr/local/bin syft
              ;;
          esac

      - name: Install terraform (plan input for the conftest cells)
        if: matrix.scanner == 'iac-custom-aws' || matrix.scanner == 'iac-platform-aws'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"
          terraform_wrapper: false   # adapters need the real binary, not the wrapper

      - name: Run adapter via dispatcher
        env:
          COMMIT_SHA: ${{ github.sha }}
          OUTPUT_DIR: ${{ github.workspace }}/evidence
        run: factory/pipeline/run-scanner.sh "${{ matrix.scanner }}"

      - name: Upload SARIF to code-scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: evidence/${{ matrix.scanner }}.sarif
          category: ${{ matrix.scanner }}

      - name: Persist evidence as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-${{ matrix.scanner }}
          path: evidence/
          retention-days: 90

  # =========================================================================
  # Step 3 -- gate. Downloads all evidence, verifies every scanner in
  # config.yaml produced a SARIF (fail-closed), fails on any CRITICAL/HIGH.
  # =========================================================================
  gate:
    name: quality-gate
    needs: scan
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v8
        with:
          path: evidence
          merge-multiple: true

      - name: Install PyYAML (used by the gate)
        run: pip install pyyaml

      - name: Evaluate gate
        run: |
          FAIL_ON=$(yq -r '.gate.fail_on | join(",")' "$CONFIG_FILE")
          EVAL=$(yq -r '.gate.evaluator' "$CONFIG_FILE")
          python3 "$EVAL" \
            --evidence-dir evidence \
            --fail-on "$FAIL_ON" \
            --config "$CONFIG_FILE"

  # =========================================================================
  # Step 4 -- supply-chain provenance.
  #
  # Only runs on push-to-main (we need a registry push to sign the image)
  # AND only after the gate has passed. Produces:
  #   - signed container image in ghcr.io (cosign keyless via OIDC)
  #   - SLSA build provenance attestation for the image
  #   - SBOM attestation for the image (CycloneDX from the SBOM job)
  # Verification (downstream deploy job):
  #   gh attestation verify oci://ghcr.io/<repo>/efex-payments@<digest> --repo <repo>
  # =========================================================================
  provenance:
    name: supply-chain provenance (push + sign + attest)
    needs: [scan, gate]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write          # OIDC for cosign keyless + native attestations
      packages: write          # push image to ghcr.io
      attestations: write      # actions/attest-* writes to the attestation store
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Download SBOM produced by the scan job
        uses: actions/download-artifact@v8
        with:
          name: evidence-sbom
          path: evidence

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image (digest pinned)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: factory/service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          provenance: true        # buildx-generated provenance (in addition to attest below)

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (cosign keyless via OIDC)
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes "$IMAGE"

      - name: Attest SLSA build provenance (GitHub-native)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Attest SBOM (GitHub-native)
        uses: actions/attest-sbom@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: evidence/sbom.cdx.json
          push-to-registry: true

      - name: Emit success marker for compliance report
        run: |
          mkdir -p evidence
          cat > evidence/supply-chain-signing.sarif <<EOF
          {"version":"2.1.0","runs":[{
            "tool":{"driver":{"name":"cosign+attest-build-provenance"}},
            "results":[],
            "invocations":[{"executionSuccessful":true,
              "properties":{"image":"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"}}]
          }]}
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: evidence-supply-chain-signing
          path: evidence/supply-chain-signing.sarif
          retention-days: 365

  # =========================================================================
  # Step 5 -- compliance report. Always runs (even on gate failure) so the
  # audit artifact ships regardless of build outcome.
  #
  # Ordering matters for evidence completeness:
  #   needs provenance       -> supply-chain-signing.sarif is in the evidence
  #                            dir before the report is generated
  #   mirror-then-report     -> evidence-retention.sarif is generated (and
  #                            true) before the report reads it
  # On PRs, provenance is skipped and those two scanners correctly show as
  # not-run in the report (PRs don't push, sign, or mirror).
  # =========================================================================
  report:
    name: compliance-report
    needs: [scan, gate, provenance]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write          # OIDC role for the evidence bucket (main only)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          path: evidence
          merge-multiple: true
      - run: pip install pyyaml

      # Mirror the scan evidence to the WORM bucket (S3 + Object Lock) on
      # main, BEFORE generating the report, so the retention marker the
      # report consumes describes something that has actually happened.
      # Bucket is provisioned by factory/infra/aws/platform/evidence_bucket.tf
      # and writeable only via an OIDC-bound role (no static AWS creds in CI).
      - name: Configure AWS credentials (OIDC, main only)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/efex-evidence-writer
          aws-region: us-east-1
      - name: Mirror scan evidence to evidence bucket
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          aws s3 cp evidence/ "s3://${{ vars.EVIDENCE_BUCKET }}/${{ github.sha }}/evidence/" \
            --recursive \
            --metadata "commit-sha=${{ github.sha }},workflow-run=${{ github.run_id }}"
      - name: Emit success marker for evidence retention
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          cat > evidence/evidence-retention.sarif <<EOF
          {"version":"2.1.0","runs":[{
            "tool":{"driver":{"name":"aws-s3-object-lock"}},
            "results":[],
            "invocations":[{"executionSuccessful":true,
              "properties":{"bucket":"${{ vars.EVIDENCE_BUCKET }}","prefix":"${{ github.sha }}/"}}]
          }]}
          EOF
      - name: Upload retention marker
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@v4
        with:
          name: evidence-evidence-retention
          path: evidence/evidence-retention.sarif
          retention-days: 365

      - name: Generate report
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          mkdir -p compliance
          python3 factory/pipeline/report/compliance_report.py \
            --evidence-dir evidence \
            --catalog factory/policies/catalog.yaml \
            --controls-dir factory/controls \
            --output compliance/report.md \
            --json compliance/report.json
      - uses: actions/upload-artifact@v4
        with:
          name: compliance-report
          path: compliance/
          retention-days: 365   # auditors hold us to a year
      - name: Render summary in workflow UI
        if: always()
        run: cat compliance/report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Push compliance report to evidence bucket
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          aws s3 cp compliance/ "s3://${{ vars.EVIDENCE_BUCKET }}/${{ github.sha }}/" \
            --recursive \
            --metadata "commit-sha=${{ github.sha }},workflow-run=${{ github.run_id }}"

      # SIEM sink: forwards report.json when the webhook secret is set.
      # Delivery failure fails the job -- evidence sinks must not be silent.
      - name: Forward report to SIEM
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        env:
          SIEM_WEBHOOK_URL: ${{ secrets.SIEM_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ -z "$SIEM_WEBHOOK_URL" ]; then
            echo "SIEM_WEBHOOK_URL not configured; skipping SIEM forwarding"
            exit 0
          fi
          python3 factory/pipeline/report/siem_forward.py --report compliance/report.json
